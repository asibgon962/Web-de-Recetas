{% extends "base.html" %}
{% block title %}Eliminar {{ receta.titulo }} — La Cocina de Casa{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:520px">
  <div class="text-center p-5" style="background:#fff;border:1px solid var(--color-borde);border-radius:14px">
    <div style="font-size:3.5rem">🗑️</div>
    <h3 class="mt-3">¿Eliminar esta receta?</h3>
    <p class="text-muted">Vas a eliminar <strong>{{ receta.titulo }}</strong>. Esta acción no se puede deshacer.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <a href="{% url 'detalle_receta' receta.slug %}" class="btn btn-outline-rustico px-4">Cancelar</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
